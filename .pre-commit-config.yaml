# ==============================================================================
# .pre-commit-config.yaml - Security hooks for AIOps Alert Project
# ==============================================================================
# Purpose:
# Prevent committing secrets (API keys, tokens, credentials) to Git
#
# Setup:
# 1. pip install pre-commit
# 2. pre-commit install
# 3. pre-commit run --all-files (initial check)
#
# ==============================================================================

repos:
  # detect-secrets: Prevent API keys, tokens from being committed
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: Detect secrets in code
        description: Prevents committing secrets to the repository
        entry: detect-secrets scan
        language: python
        types: [python, yaml, json, markdown, text]
        stages: [commit]
        exclude: |
          (?x)^(
            \.github/|
            docs/PROJECT-ARCHITECTURE\.md|
            docs/E2E-TEST-PLAN\.md
          )
        args:
          - --baseline
          - .secrets.baseline

  # Gitleaks: Comprehensive secrets scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks
        name: Detect secrets with Gitleaks
        description: Comprehensive secret scanner for Git repos
        entry: gitleaks protect --verbose --redact
        language: golang
        stages: [commit]

  # Trufflehogsecrets: Deep secret scanning
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.63.0
    hooks:
      - id: trufflehog
        name: TruffleHog - Secrets Scanner
        entry: trufflehog git file://
        language: golang
        types: [python]
        stages: [commit]

  # YAML linting with safety rules
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.26.3
    hooks:
      - id: yamllint
        name: Lint YAML files
        description: Check YAML syntax and security
        args:
          - --config-data
          - |
            {
              extends: default,
              rules: {
                line-length: {max: 120},
                trailing-spaces: enable,
                indentation: {spaces: 2}
              }
            }
        types: [yaml]

  # JSON linting
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.9.0
    hooks:
      - id: pretty-format-json
        args: [--autofix, --indent=2]
        types: [json]

  # General best practices
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: check-yaml
        name: Check YAML
        args: [--unsafe]
      - id: check-json
        name: Check JSON
      - id: check-case-conflict
        name: Check for case conflicts
      - id: detect-private-key
        name: Detect private keys
      - id: end-of-file-fixer
        name: Fix end of file
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: mixed-line-ending
        name: Fix mixed line endings

