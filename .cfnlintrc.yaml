# cfn-lint 設定ファイル
# プロジェクトルートに配置し、cfn-lint 実行時に自動参照される

regions:
  - ap-northeast-1

ignore_checks:
  # E3006: AWS::BedrockAgentCore::Runtime が cfn-lint 1.37.0 のスキーマに未登録
  # 根拠: AWS 公式 CFN ドキュメントで実在を確認済み
  # https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-bedrockagentcore-runtime.html
  # cfn-lint のスキーマ更新（pip upgrade）ではなく、プロジェクト設定で明示的に除外する
  - E3006

  # W3037: bedrock-agentcore:* アクションが cfn-lint IAM アクションリストに未登録
  # 根拠: AWS 公式 IAM ドキュメントで実在を確認済み
  # https://docs.aws.amazon.com/bedrock-agentcore/latest/devguide/runtime-permissions.html
  - W3037
