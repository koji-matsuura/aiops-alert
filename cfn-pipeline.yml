AWSTemplateFormatVersion: '2010-09-09'
Description: CodePipeline for Bedrock AIOps Agent Deployment

# ------------------------------------------------------------#
# Input Parameters
# ------------------------------------------------------------#
Parameters:
  TemplatePath:
    Type: String
    Default: cfn_templete
  ServiceName:
    Type: String
    Description: System name. use lower case only. (e.g. example)
    Default: image
    MaxLength: 10
    MinLength: 1
  GithubRepo:
    Type: String
    Default: cfn-infra-base
  BranchName:
    Type: String
    Description: The branch name of the GitHub repository to use as the source of the pipeline. (e.g. main)
    Default: main
  EnvName:
    Type: String
    Description: System sub name. use lower case only. (e.g. prod or dev)
    Default: dev
    MaxLength: 10
    MinLength: 1
    AllowedPattern: "^[a-z0-9]+$"
  GithubOwner:
    Type: String
    MaxLength: 30
    MinLength: 1
  PROJECT:
    Type: String
    Description: The directory name of the project in the GitHub repository. (e.g. bedrock-agent)
    Default: ./
    MaxLength: 30
    MinLength: 1

Resources:
  # ------------------------------------------------------------
  # ECR リポジトリ（AgentCore Runtime コンテナ用）
  # Pipeline CFN スタック作成時に ECR が作成される → Build フェーズの前に存在する
  # 参照: cfn-infra-base/cfn-pipeline.yml 行91-94
  # ------------------------------------------------------------
  EcrRepositoryAiopsAgentcore:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub '${EnvName}-${ServiceName}-aiops-agentcore'
      ImageScanningConfiguration:
        ScanOnPush: true
      Tags:
        - Key: ResourceGroup
          Value: !Sub '${EnvName}-${ServiceName}'

  # S3 Artifact Bucket
  S3BucketArtifact:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${EnvName}-${ServiceName}-aiops-artifact
      LifecycleConfiguration:
        Rules:
          - Id: AutoDelete
            Status: Enabled
            ExpirationInDays: 14
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: ResourceGroup
          Value: !Sub ${EnvName}-${ServiceName}

  S3BucketLogs:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${EnvName}-${ServiceName}-ai-agents3-logs
      LifecycleConfiguration:
        Rules:
          - Id: AutoDelete
            Status: Enabled
            ExpirationInDays: 365
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: ResourceGroup
          Value: !Sub ${EnvName}-${ServiceName}

# ------------------------------------------------------------#
# CodePipeline
# ------------------------------------------------------------#
  CodePipelineAiAgent:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub ${EnvName}-${ServiceName}-aiagent
      PipelineType: V2
      ArtifactStore:
        Location: !Ref S3BucketArtifact
        Type: S3
      RestartExecutionOnUpdate: false
      RoleArn: !GetAtt CodePipelineServiceRoleAiAgent.Arn
      Stages:
        - Name: Source
          Actions:
            - Name: SourceAction
              ActionTypeId:
                Category: Source
                Owner: ThirdParty
                Version: "1"
                Provider: GitHub
              Configuration:
                Owner: !Ref GithubOwner
                Repo: !Ref GithubRepo
                PollForSourceChanges: false
                Branch: !Ref BranchName
                OAuthToken: !Sub "{{resolve:secretsmanager:${EnvName}-${ServiceName}-github-base-token:SecretString:::}}"
              RunOrder: 1
              OutputArtifacts:
                - Name: Source
        - Name: Build
          Actions:
            - Name: Build
              RunOrder: 1
              Region: !Sub ${AWS::Region}
              ActionTypeId:
                Category: Build
                Owner: AWS
                Version: 1
                Provider: CodeBuild
              Configuration:
                ProjectName: !Ref CodeBuildProjectAiAgent
              InputArtifacts:
                - Name: Source
              OutputArtifacts:
                - Name: Build
        - Name: DeployInfrastructure
          Actions:
            - Name: Deploy
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Version: "1"
                Provider: CloudFormation
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: !Sub ${EnvName}-${ServiceName}-aiops-base
                TemplatePath: Build::main.yaml
                TemplateConfiguration: !Sub Build::cfn-${EnvName}-parameters.json
                RoleArn: !GetAtt CodePipelineDeployCreateUpdateRoleAiAgent.Arn
                Capabilities: CAPABILITY_NAMED_IAM
              RunOrder: 1
              InputArtifacts:
                - Name: Build
      Tags:
        - Key: ResourceGroup
          Value: !Sub ${EnvName}-${ServiceName}

# ------------------------------------------------------------#
# CodePipeline Service Role (IAM)
# ------------------------------------------------------------#
  CodePipelineServiceRoleAiAgent:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub CpServiceRoleAiAgent-${EnvName}-${ServiceName}
      Description: This role allows CodePipeline to call each stages.
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
              - codepipeline.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: !Sub CpServicePolicyAiAgent-${EnvName}-${ServiceName}
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - "codebuild:BatchGetBuilds"
                  - "codebuild:StartBuild"
                  - "codebuild:BatchGetBuildBatches"
                  - "codebuild:StartBuildBatch"
                  - "cloudformation:DescribeStacks"
                  - "cloudformation:CreateStack"
                  - "cloudformation:DeleteStack"
                  - "cloudformation:UpdateStack"
                  - "cloudformation:CreateChangeSet"
                  - "cloudformation:DeleteChangeSet"
                  - "cloudformation:ExecuteChangeSet"
                  - "cloudformation:DescribeChangeSet"
                Resource: "*"
              - Effect: Allow
                Action:
                  - "cloudwatch:*"
                Resource: "*"
              - Effect: Allow
                Action:
                  - "s3:ListBucket"
                  - "s3:GetBucketVersioning"
                  - "s3:GetBucketLocation"
                Resource:
                  - !Sub "arn:aws:s3:::${EnvName}-${ServiceName}-aiops-artifact"
              - Effect: Allow
                Action:
                  - "s3:GetObject"
                  - "s3:PutObject"
                Resource:
                  - !Sub "arn:aws:s3:::${EnvName}-${ServiceName}-aiops-artifact/*"
              - Effect: Allow
                Action:
                  - "iam:PassRole"
                Resource:
                  - !GetAtt CodePipelineDeployCreateUpdateRoleAiAgent.Arn
                  - !GetAtt CodeBuildServiceRoleAiAgent.Arn
              - Effect: Allow
                Action:
                  - "lambda:InvokeFunction"
                  - "lambda:ListFunctions"
                Resource: "*"
              - Effect: Allow
                Action: "sts:AssumeRole"
                Resource:
                   - !GetAtt CodePipelineDeployCreateUpdateActionRoleAiAgent.Arn

# ------------------------------------------------------------#
# CodePipeline Deploy Create Update Role (IAM)
# ------------------------------------------------------------#
  CodePipelineDeployCreateUpdateRoleAiAgent:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvName}-${ServiceName}-cloudformation-update-role
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
        Version: "2012-10-17"
      Path: /
      Policies:
        - PolicyName: "iamPolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Role creation and management (same principal/name prefix only)
              - Effect: "Allow"
                Action:
                   - "iam:CreateRole"
                   - "iam:DeleteRole"
                   - "iam:UpdateRole"
                   - "iam:GetRole"
                   - "iam:TagRole"
                   - "iam:UntagRole"
                   - "iam:PutRolePolicy"
                   - "iam:DeleteRolePolicy"
                   - "iam:GetRolePolicy"
                   - "iam:ListAttachedRolePolicies"
                   - "iam:ListRolePolicies"
                   - "iam:UpdateAssumeRolePolicy"
                Resource:
                   - !Sub "arn:aws:iam::${AWS::AccountId}:role/${EnvName}-${ServiceName}-*"
              
              # AttachRolePolicy and DetachRolePolicy (restricted to custom policies only)
              - Effect: "Allow"
                Action:
                   - "iam:AttachRolePolicy"
                   - "iam:DetachRolePolicy"
                Resource:
                   - !Sub "arn:aws:iam::${AWS::AccountId}:role/${EnvName}-${ServiceName}-*"
                Condition:
                  ArnLike:
                    "iam:PolicyArn": 
                      - !Sub "arn:aws:iam::${AWS::AccountId}:policy/${EnvName}-${ServiceName}-*"
              
              # Policy creation and management (custom policies only)
              - Effect: "Allow"
                Action:
                   - "iam:CreatePolicy"
                   - "iam:DeletePolicy"
                   - "iam:GetPolicy"
                   - "iam:ListPolicyVersions"
                   - "iam:GetPolicyVersion"
                   - "iam:CreatePolicyVersion"
                   - "iam:DeletePolicyVersion"
                Resource:
                   - !Sub "arn:aws:iam::${AWS::AccountId}:policy/${EnvName}-${ServiceName}-*"
              
              # Instance Profile management
              - Effect: "Allow"
                Action:
                   - "iam:CreateInstanceProfile"
                   - "iam:DeleteInstanceProfile"
                   - "iam:GetInstanceProfile"
                   - "iam:AddRoleToInstanceProfile"
                   - "iam:RemoveRoleFromInstanceProfile"
                Resource:
                   - !Sub "arn:aws:iam::${AWS::AccountId}:instance-profile/${EnvName}-${ServiceName}-*"
              - Effect: "Allow"
                Action:
                  - "iam:PassRole"
                Resource:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/${EnvName}-${ServiceName}-*"
              - Effect: "Allow"
                Action:
                  - "iam:CreateServiceLinkedRole"
                  - "iam:ListRoles"
                  - "iam:ListInstanceProfiles"
                  - "iam:ListPolicies"
                  - "iam:GetRole"
                  - "iam:DetachRolePolicy"
                Resource: "*"
        - PolicyName: "CloudformationPolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: "Allow"
                Action:
                  - "logs:*"
                  - "secretsmanager:*"
                  - "ecr:*"
                  - "rds:*"
                  - "cloudformation:*"
                  - "codepipeline:*"
                  - "codebuild:*"
                  - "events:*"
                  - "lambda:*"
                  - "cognito-idp:*"
                  - "ec2:CreateSecurityGroup"
                  - "ec2:DeleteSecurityGroup"
                  - "ec2:DescribeSecurityGroups"
                  - "ec2:AuthorizeSecurityGroupIngress"
                  - "ec2:RevokeSecurityGroupIngress"
                  - "ec2:CreateTags"
                  - "ec2:DeleteTags"
                  - "ec2:CreateVpcEndpoint"
                  - "ec2:DeleteVpcEndpoints"
                  - "ec2:DescribeVpcEndpoints"
                Resource:
                  - "*"
        - PolicyName: "CloudformationPolicy-global"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # S3 bucket management (artifact and templates only)
              - Effect: "Allow"
                Action:
                  - "s3:GetBucket*"
                  - "s3:ListBucket*"
                  - "s3:PutObject"
                  - "s3:GetObject"
                  - "s3:GetObjectVersion"
                  - "s3:DeleteObject"
                Resource:
                  - !Sub "arn:aws:s3:::${EnvName}-${ServiceName}-*"
                  - !Sub "arn:aws:s3:::${EnvName}-${ServiceName}-*/*"
              
              # CloudWatch Logs (only for pipeline and CloudFormation stacks)
              - Effect: "Allow"
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                  - "logs:DescribeLogGroups"
                  - "logs:DescribeLogStreams"
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/cloudformation/*"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
              
              # SNS (only for CloudFormation notifications)
              - Effect: "Allow"
                Action:
                  - "sns:Publish"
                  - "sns:Subscribe"
                  - "sns:CreateTopic"
                  - "sns:GetTopicAttributes"
                Resource:
                  - !Sub "arn:aws:sns:${AWS::Region}:${AWS::AccountId}:${EnvName}-${ServiceName}-*"
              
              # Bedrock Agent (only for Knowledge Base and Agent operations)
              - Effect: "Allow"
                Action:
                  - "bedrock:CreateAgent"
                  - "bedrock:UpdateAgent"
                  - "bedrock:GetAgent"
                  - "bedrock:CreateAgentActionGroup"
                  - "bedrock:UpdateAgentActionGroup"
                  - "bedrock:CreateKnowledgeBase"
                  - "bedrock:UpdateKnowledgeBase"
                  - "bedrock:CreateDataSource"
                  - "bedrock:UpdateDataSource"
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent/*"
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/*"

              # AgentCore Runtime - AWS::BedrockAgentCore::Runtime の作成・更新・削除に必要な最小権限
              # ソース: https://docs.aws.amazon.com/service-authorization/latest/reference/list_amazonbedrockagentcore.html
              #
              # (1) Resource types が空のアクション = Resource: "*" 必須
              - Effect: "Allow"
                Action:
                  - "bedrock-agentcore:CreateAgentRuntime"
                  - "bedrock-agentcore:ListAgentRuntimes"
                Resource: "*"
              # (2) runtime リソースに対する操作
              - Effect: "Allow"
                Action:
                  - "bedrock-agentcore:UpdateAgentRuntime"
                  - "bedrock-agentcore:DeleteAgentRuntime"
                  - "bedrock-agentcore:GetAgentRuntime"
                  - "bedrock-agentcore:CreateAgentRuntimeEndpoint"
                  - "bedrock-agentcore:ListAgentRuntimeEndpoints"
                  - "bedrock-agentcore:TagResource"
                  - "bedrock-agentcore:UntagResource"
                Resource:
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*"
              # (3) runtime-endpoint リソースに対する操作
              - Effect: "Allow"
                Action:
                  - "bedrock-agentcore:UpdateAgentRuntimeEndpoint"
                  - "bedrock-agentcore:DeleteAgentRuntimeEndpoint"
                  - "bedrock-agentcore:GetAgentRuntimeEndpoint"
                Resource:
                  # runtime-endpoint 操作の Resource
                  # CloudTrail 確認: DeleteAgentRuntime が内部的に DeleteAgentRuntimeEndpoint を
                  # runtime/{id} ARN（runtime-endpoint/* ではなく runtime/* ARN）で呼び出す
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*"
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*/runtime-endpoint/*"
              # (4) workload-identity に対する操作（Runtime 作成時に自動作成される）
              # CloudTrail 確認: CreateWorkloadIdentity が tags パラメータを含むため
              # 内部的に TagResource を workload-identity リソースへ呼び出す
              - Effect: "Allow"
                Action:
                  - "bedrock-agentcore:CreateWorkloadIdentity"
                  - "bedrock-agentcore:GetWorkloadIdentity"
                  - "bedrock-agentcore:DeleteWorkloadIdentity"
                  - "bedrock-agentcore:UpdateWorkloadIdentity"
                  - "bedrock-agentcore:ListWorkloadIdentities"
                  - "bedrock-agentcore:TagResource"
                  - "bedrock-agentcore:UntagResource"
                Resource:
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default"
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default/workload-identity/*"
              
              # OpenSearch Serverless (only for collection operations)
              - Effect: "Allow"
                Action:
                  - "aoss:CreateCollection"
                  - "aoss:UpdateCollection"
                  - "aoss:BatchGetCollection"
                  - "aoss:CreateAccessPolicy"
                  - "aoss:UpdateAccessPolicy"
                Resource:
                  - !Sub "arn:aws:aoss:${AWS::Region}:${AWS::AccountId}:collection/*"
              
              # API Gateway (only for webhook API)
              - Effect: "Allow"
                Action:
                  - "apigateway:POST"
                  - "apigateway:GET"
                  - "apigateway:PUT"
                  - "apigateway:DELETE"
                  - "apigateway:UpdateRestApiPolicy"
                Resource:
                  - !Sub "arn:aws:apigateway:${AWS::Region}::/restapis/*"
              
              # SQS (only for DLQ operations)
              - Effect: "Allow"
                Action:
                  - "sqs:CreateQueue"
                  - "sqs:GetQueueAttributes"
                  - "sqs:SetQueueAttributes"
                Resource:
                  - !Sub "arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:${EnvName}-${ServiceName}-*"

# ------------------------------------------------------------#
# CodePipeline Deploy Create Update Action Role (IAM)
# ------------------------------------------------------------#
  CodePipelineDeployCreateUpdateActionRoleAiAgent:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub CpCrUpdActionRoleAiAgent-${EnvName}-${ServiceName}
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
        Version: "2012-10-17"
      Path: /
      Policies:
        - PolicyName: "inline-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Action: iam:PassRole
                Effect: Allow
                Resource: !GetAtt CodePipelineDeployCreateUpdateRoleAiAgent.Arn
              - Action:
                  - s3:GetBucket*
                  - s3:GetObject*
                  - s3:List*
                Effect: Allow
                Resource:
                  - !GetAtt S3BucketArtifact.Arn
                  - !Sub ${S3BucketArtifact.Arn}/*
              - Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Effect: Allow
                Resource:
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codepipeline/*


# ============================================================
# CodeBuild Project
# ============================================================
  CodeBuildProjectAiAgent:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${EnvName}-${ServiceName}-aiagent
      Description: Build project for Bedrock AIOps Agent
      ServiceRole: !GetAtt CodeBuildServiceRoleAiAgent.Arn
      Artifacts:
        Type: CODEPIPELINE
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          environment_variables:
            plaintext:
              CHILD_TEMPLATES: |
                cfn-templates/main.yaml
                cfn-templates/s3.yaml
                cfn-templates/lambda-function.yaml
                cfn-templates/agentcore-runtime.yaml
                cfn-templates/knowledge-base.yaml
                cfn-templates/eventbridge-alarms.yaml
                cfn-templates/secrets-manager.yaml
                cfn-templates/slack-webhook.yaml
                cfn-templates/sqs-dlq.yaml
                cfn-templates/chatbot-slack-notification.yaml
              CONFIG_FILES: |
                cfn-dev-parameters.json
                cfn-stg-parameters.json
                cfn-prd-parameters.json
          phases:
            pre_build:
              commands:
                - echo "Installing Python dependencies..."
                - pip install --upgrade pip
                - pip install boto3
            build:
              commands:
                - cd $PROJECT
                - echo "Packaging Lambda functions..."
                - mkdir -p dist
                - |
                  if [ -f "lambda/handler.py" ]; then
                    echo "Found Lambda handler (lambda/handler.py), packaging..."
                    mkdir -p lambda_package
                    cp lambda/handler.py lambda_package/lambda_function.py
                    cd lambda_package
                    pip install --target . "boto3>=1.39.8" -q
                    zip -r ../dist/lambda.zip . -q
                    cd ..
                    echo "Lambda package created: dist/lambda.zip"
                  fi
                - echo "Building AgentCore Runtime Docker image (ARM64)..."
                - |
                  echo "Logging in to Amazon ECR..."
                  aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
                - |
                  IMAGE_REPO_NAME="$EnvName-$ServiceName-aiops-agentcore"
                  IMAGE_TAG="${CODEBUILD_RESOLVED_SOURCE_VERSION:-latest}"
                  ECR_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME"
                  echo "Building image: $ECR_URI:$IMAGE_TAG"
                  docker build --platform linux/arm64 -t $IMAGE_REPO_NAME:$IMAGE_TAG .
                  docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $ECR_URI:$IMAGE_TAG
                  docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $ECR_URI:latest
                  docker push $ECR_URI:$IMAGE_TAG
                  docker push $ECR_URI:latest
                  echo "AgentCore Docker image pushed: $ECR_URI:$IMAGE_TAG"
                - |
                  if [ -f "lib/slack_webhook_handler.py" ]; then
                    echo "Found Webhook handler, packaging..."
                    mkdir -p webhook_package
                    cp lib/slack_webhook_handler.py webhook_package/slack_webhook_handler.py
                    cd webhook_package
                    pip install --target . boto3 urllib3 -q
                    zip -r ../dist/lambda-webhook.zip . -q
                    cd ..
                    echo "Webhook package created: dist/lambda-webhook.zip"
                  fi
                - echo "Uploading Lambda ZIPs to S3..."
                - |
                  if [ -f "dist/lambda.zip" ]; then
                    aws s3 cp dist/lambda.zip s3://$TEMPLATE_BUCKET/lambda.zip
                    echo "Lambda ZIP uploaded to s3://$TEMPLATE_BUCKET/lambda.zip"
                  fi
                - |
                  if [ -f "dist/lambda-webhook.zip" ]; then
                    aws s3 cp dist/lambda-webhook.zip s3://$TEMPLATE_BUCKET/lambda-webhook.zip
                    echo "Webhook ZIP uploaded to s3://$TEMPLATE_BUCKET/lambda-webhook.zip"
                  fi
                - echo "Copying CloudFormation templates to S3..."
                - |
                  for child_template in $CHILD_TEMPLATES; do
                    if [ "X$TEMPLATE_PREFIX" = "X" ]; then
                      aws s3 cp "$child_template" "s3://$TEMPLATE_BUCKET/$child_template"
                    else
                      aws s3 cp "$child_template" "s3://$TEMPLATE_BUCKET/$TEMPLATE_PREFIX/$child_template"
                    fi
                  done
            post_build:
              commands:
                - echo "Injecting dynamic parameters into cfn-*.json..."
                - |
                  # AgentCoreImageTag: コミットハッシュをタグとして使用
                  IMAGE_TAG="${CODEBUILD_RESOLVED_SOURCE_VERSION:-latest}"
                  echo "AgentCoreImageTag = $IMAGE_TAG"

                  # LambdaS3ObjectVersion: S3 バージョニングから最新バージョン ID を取得
                  LAMBDA_VERSION=$(aws s3api head-object \
                    --bucket $TEMPLATE_BUCKET \
                    --key lambda.zip \
                    --query VersionId --output text 2>/dev/null || echo "")
                  if [ "$LAMBDA_VERSION" = "None" ] || [ -z "$LAMBDA_VERSION" ]; then
                    LAMBDA_VERSION=""
                  fi
                  echo "LambdaS3ObjectVersion = $LAMBDA_VERSION"

                  # 各環境の cfn-*.json に注入
                  for env_file in cfn-dev-parameters.json cfn-stg-parameters.json cfn-prd-parameters.json; do
                    if [ -f "$env_file" ]; then
                      python3 -c "import json; d=json.load(open('$env_file')); d.setdefault('Parameters',{})['AgentCoreImageTag']='$IMAGE_TAG'; d['Parameters']['LambdaS3ObjectVersion']='$LAMBDA_VERSION'; json.dump(d, open('$env_file','w'), indent=2)"
                      echo "Injected params into $env_file"
                    fi
                  done
                - echo "Copying root CloudFormation template to BuildOutput..."
                - cp cfn-templates/main.yaml $PROJECT/main.yaml
                - echo "Build and upload complete"
          artifacts:
            files:
              - $PROJECT/main.yaml
              - $PROJECT/cfn-dev-parameters.json
              - $PROJECT/cfn-stg-parameters.json
              - $PROJECT/cfn-prd-parameters.json
            discard-paths: yes
      SourceVersion: refs/heads/main
      Environment:
        Type: ARM_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: "aws/codebuild/amazonlinux-aarch64-standard:3.0"
        ImagePullCredentialsType: CODEBUILD
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: AWS_DEFAULT_REGION
            Type: PLAINTEXT
            Value: !Sub ${AWS::Region}
          - Name: AWS_ACCOUNT_ID
            Type: PLAINTEXT
            Value: !Sub ${AWS::AccountId}
          - Name: PROJECT
            Type: PLAINTEXT
            Value: !Ref PROJECT
          - Name: EnvName
            Type: PLAINTEXT
            Value: !Ref EnvName
          - Name: ServiceName
            Type: PLAINTEXT
            Value: !Ref ServiceName
          - Name: TEMPLATE_PREFIX
            Value: !Ref TemplatePath
          - Name: TEMPLATE_BUCKET
            Value: !Sub ${EnvName}-${ServiceName}-aiops-artifact
      Tags:
        - Key: ResourceGroup
          Value: !Sub ${EnvName}-${ServiceName}

# ============================================================
# CodeBuild Service Role (IAM)
# ============================================================
  CodeBuildServiceRoleAiAgent:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub CbServiceRoleAiAgent-${EnvName}-${ServiceName}
      Description: This role allows CodeBuild to interact with dependant AWS services.
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
              - codebuild.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryPowerUser
      Policies:
        - PolicyName: !Sub CbServicePolicyAiAgent-${EnvName}-${ServiceName}
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - "ssm:GetParameters"
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${EnvName}_${ServiceName}_*"
              - Effect: Allow
                Action:
                  - "s3:*"
                Resource:
                  - !Sub arn:aws:s3:::${S3BucketArtifact}
                  - !Sub arn:aws:s3:::${S3BucketArtifact}/*
                  - !Sub arn:aws:s3:::${S3BucketLogs}
                  - !Sub arn:aws:s3:::${S3BucketLogs}/*
              - Effect: Allow
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${EnvName}-${ServiceName}-aiagent"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${EnvName}-${ServiceName}-aiagent:*"
              - Effect: Allow
                Action:
                  - "codebuild:CreateReportGroup"
                  - "codebuild:CreateReport"
                  - "codebuild:UpdateReport"
                  - "codebuild:BatchPutTestCases"
                  - "codebuild:BatchPutCodeCoverages"
                Resource:
                  - !Sub "arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:report-group/${EnvName}-${ServiceName}-aiagent-*"
      Tags:
        - Key: ResourceGroup
          Value: !Sub ${EnvName}-${ServiceName}

Outputs:
  PipelineURL:
    Description: CodePipeline URL
    Value: !Sub https://console.aws.amazon.com/codepipeline/home?region=${AWS::Region}#/view/${CodePipelineAiAgent}
  ArtifactBucketName:
    Description: S3 Artifact Bucket Name
    Value: !Ref S3BucketArtifact
  LogsBucketName:
    Description: S3 Logs Bucket Name
    Value: !Ref S3BucketLogs
