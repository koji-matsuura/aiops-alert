AWSTemplateFormatVersion: '2010-09-09'
Description: 'Secrets Manager resources for AIOps platform - manages Slack credentials securely'

Parameters:
  EnvironmentName:
    Type: String
    Description: Environment name (dev, stg, prod)
    Default: dev
    AllowedValues:
      - dev
      - stg
      - prod

  AWSAccountId:
    Type: String
    Description: AWS Account ID for constructing role ARN
    AllowedPattern: '^\d{12}$'
    Default: '582765029153'

Resources:
  # ===== Slack Credentials Secret =====
  # NOTE: Secret content is NOT embedded in CloudFormation template
  # Secrets are registered AFTER stack deployment via AWS CLI or CodePipeline
  # This prevents credential leakage in git history and CloudFormation events
  # Reference: AWS Secrets Manager Best Practices
  # https://docs.aws.amazon.com/secretsmanager/latest/userguide/cloudformation.html
  SlackCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub 'aiops/${EnvironmentName}/slack'
      Description: 'Slack app credentials (signing secret and bot token) - register via CLI after deployment'
      # KmsKeyId omitted - uses AWS managed key (aws/secretsmanager) as per AWS recommendation
      # Reference: https://docs.aws.amazon.com/prescriptive-guidance/latest/encryption-best-practices/secrets-manager.html
      # "For most use cases, AWS recommends using the free aws/secretsmanager AWS managed key"
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Application
          Value: aiops
        - Key: Service
          Value: slack-integration
        - Key: CredentialManagement
          Value: manual-cli-registration

  # ===== Secret Resource Policy (restrict access to Lambda) =====
  SlackCredentialsSecretPolicy:
    Type: AWS::SecretsManager::ResourcePolicy
    Properties:
      SecretId: !Ref SlackCredentialsSecret
      ResourcePolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowLambdaRead
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWSAccountId}:role/aiops-webhook-lambda-role-${EnvironmentName}'
            Action:
              - 'secretsmanager:GetSecretValue'
            Resource: '*'

  # ===== Manual Secret Registration Instructions =====
  # After CloudFormation deployment, register secrets via AWS CLI:
  #
  # aws secretsmanager put-secret-value \
  #   --secret-id aiops/dev/slack \
  #   --secret-string '{
  #     "signing_secret": "<your-slack-signing-secret>",
  #     "bot_token": "<your-slack-bot-token>"
  #   }'
  #
  # This approach ensures:
  # - Credentials are NOT stored in CloudFormation templates
  # - Credentials are NOT recorded in git history
  # - Credentials are NOT visible in CloudFormation events
  # - Credentials are encrypted with AWS managed key (cost-effective, AWS recommended)

Outputs:
  SlackCredentialsSecretArn:
    Description: 'ARN of Slack credentials secret'
    Value: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:aiops/${EnvironmentName}/slack'
    Export:
      Name: !Sub 'aiops-${EnvironmentName}-slack-secret-arn'

  SlackCredentialsSecretName:
    Description: 'Name of Slack credentials secret'
    Value: !Ref SlackCredentialsSecret
    Export:
      Name: !Sub 'aiops-${EnvironmentName}-slack-secret-name'

  SetupInstructionsDocumentation:
    Description: 'Reference documentation for Slack credentials registration'
    Value: 'docs/SECRET-REGISTRATION-GUIDE.md'
