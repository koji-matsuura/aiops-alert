# main.yaml with all nested stacks
AWSTemplateFormatVersion: '2010-09-09'
Description: AIOps Bedrock Agent CloudFormation
Parameters:
  EnvName:
    Type: String
    Description: Environment name (dev, stg, prd)
    Default: dev
  FoundationModel:
    Type: String
    Default: anthropic.claude-haiku-4-5-20251001-v1:0
    Description: Bedrock Agent用ファンデーションモデル
  VectorIndexName:
    Type: String
    Default: aiops-kb-index
    Description: OpenSearch内のベクトルインデックス名
  EmbeddingModelArn:
    Type: String
    Default: arn:aws:bedrock:ap-northeast-1::foundation-model/amazon.titan-embed-text-v2:0
    Description: Bedrock TitanエンベーディングモデルのARN
  SlackWorkspaceId:
    Type: String
    Description: Slack Workspace ID
    Default: ""
  SlackChannelId:
    Type: String
    Description: Slack Channel ID for notifications
    Default: ""
  ServiceName:
    Type: String
    Description: Service name for resource naming
    Default: aiops
  TempletePrefix:
    Type: String
    Description: S3 prefix for CloudFormation templates
    Default: cfn_templates
Resources:
  S3Stack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${EnvName}-${ServiceName}-aiops-artifact/${TempletePrefix}/cfn-templates/s3.yaml'
      Parameters:
        EnvName: !Ref EnvName
        ThreadMappingRetentionDays: "1"
        PendingConfirmationRetentionDays: "7"
        ReportsRetentionDays: "30"

  OpensearchStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${EnvName}-${ServiceName}-aiops-artifact/${TempletePrefix}/cfn-templates/opensearch.yaml'

  LambdaStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${EnvName}-${ServiceName}-aiops-artifact/${TempletePrefix}/cfn-templates/lambda-function.yaml'
      Parameters:
        BucketName: !Sub ${EnvName}-${ServiceName}-aiops-artifact
        SNSTopicArn: !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:${EnvName}-aiops-notification'
        BedrockAgentId: !GetAtt BedrockAgentStack.Outputs.AgentId
        BedrockAgentAlias: 'TSTALIASID'

  SecretsManagerStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${EnvName}-${ServiceName}-aiops-artifact/${TempletePrefix}/cfn-templates/secrets-manager.yaml'
      Parameters:
        EnvironmentName: !Ref EnvName

  SlackWebhookStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${EnvName}-${ServiceName}-aiops-artifact/${TempletePrefix}/cfn-templates/slack-webhook.yaml'
      Parameters:
        TemplateBucketName: !Sub ${EnvName}-${ServiceName}-aiops-artifact
        EnvironmentName: !Ref EnvName
        S3DataBucket: !GetAtt S3Stack.Outputs.BucketName
        SlackCredentialsSecretArn: !GetAtt SecretsManagerStack.Outputs.SlackCredentialsSecretArn

  ChatbotSlackNotificationStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: SlackWebhookStack
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${EnvName}-${ServiceName}-aiops-artifact/${TempletePrefix}/cfn-templates/chatbot-slack-notification.yaml'
      Parameters:
        EnvName: !Ref EnvName
        ServiceName: !Ref ServiceName
        SlackWorkspaceId: !Ref SlackWorkspaceId
        SlackChannelId: !Ref SlackChannelId

  KnowledgeBaseStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${EnvName}-${ServiceName}-aiops-artifact/${TempletePrefix}/cfn-templates/knowledge-base.yaml'
      Parameters:
        OpenSearchCollectionArn: !GetAtt OpensearchStack.Outputs.CollectionArn
        S3DataBucketArn: !GetAtt S3Stack.Outputs.BucketArn
        VectorIndexName: !Ref VectorIndexName
        EmbeddingModelArn: !Ref EmbeddingModelArn

  BedrockAgentStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${EnvName}-${ServiceName}-aiops-artifact/${TempletePrefix}/cfn-templates/bedrock-agent.yaml'
      Parameters:
        FoundationModel: !Ref FoundationModel
        KnowledgeBaseId: !GetAtt KnowledgeBaseStack.Outputs.KnowledgeBaseId
        # ActionGroupLambdaArn is built via !Sub (not GetAtt) to break the
        # Lambda <-> Bedrock Agent circular dependency.
        # LambdaStack needs Agent ID (GetAtt BedrockAgentStack.Outputs.AgentId),
        # so BedrockAgentStack must NOT depend on LambdaStack via GetAtt.
        # FunctionName 'AiopsLambda' is a fixed value in lambda-function.yaml.
        ActionGroupLambdaArn: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:AiopsLambda'

  EventBridgeAlarmsStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${EnvName}-${ServiceName}-aiops-artifact/${TempletePrefix}/cfn-templates/eventbridge-alarms.yaml'
      Parameters:
        LambdaFunctionArn: !GetAtt LambdaStack.Outputs.LambdaARN
        Environment: !Ref EnvName

Outputs: {}
