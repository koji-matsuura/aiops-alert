# main.yaml - AIOps AgentCore Runtime CloudFormation root stack
AWSTemplateFormatVersion: '2010-09-09'
Description: AIOps AgentCore Runtime CloudFormation

Parameters:
  EnvName:
    Type: String
    Description: Environment name (dev, stg, prd)
    Default: dev
  VectorIndexName:
    Type: String
    Default: aiops-kb-index
    Description: OpenSearch vector index name
  EmbeddingModelArn:
    Type: String
    Default: arn:aws:bedrock:ap-northeast-1::foundation-model/amazon.titan-embed-text-v2:0
    Description: Bedrock Titan embedding model ARN
  SlackWorkspaceId:
    Type: String
    Description: Slack Workspace ID
    Default: ""
  SlackChannelId:
    Type: String
    Description: Slack Channel ID for notifications
    Default: ""
  ServiceName:
    Type: String
    Description: Service name for resource naming
    Default: aiops
  TempletePrefix:
    Type: String
    Description: S3 prefix for CloudFormation templates
    Default: cfn_templates
  AgentCoreImageTag:
    Type: String
    Description: >
      ECR image tag for AgentCore Runtime container.
      CodeBuild post_build で CODEBUILD_RESOLVED_SOURCE_VERSION から取得し
      cfn-*.json に注入される。更新の都度 AgentCore Runtime が再デプロイされる。
    Default: latest
  LambdaS3ObjectVersion:
    Type: String
    Description: >
      S3 Object Version ID of lambda.zip.
      CodeBuild post_build で取得し cfn-*.json に注入される。
      S3Key が変わらなくても Lambda が更新される。
    Default: ''
  BedrockKbModelArn:
    Type: String
    # inference profile ID を使用（foundation model ARN は on-demand throughput 非対応）
    # ソース: https://docs.aws.amazon.com/bedrock/latest/userguide/model-card-anthropic-claude-haiku-4-5.html
    Default: 'ap-northeast-1.anthropic.claude-haiku-4-5-20251001-v1:0'
    Description: Bedrock inference profile ID for AgentCore Runtime AI inference

Resources:
  S3Stack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${EnvName}-${ServiceName}-aiops-artifact/${TempletePrefix}/cfn-templates/s3.yaml'
      Parameters:
        EnvName: !Ref EnvName
        ThreadMappingRetentionDays: "1"
        PendingConfirmationRetentionDays: "7"
        ReportsRetentionDays: "30"

  # Knowledge Base stack (OpenSearch Serverless included)
  KnowledgeBaseStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${EnvName}-${ServiceName}-aiops-artifact/${TempletePrefix}/cfn-templates/knowledge-base.yaml'
      Parameters:
        S3DataBucketArn: !GetAtt S3Stack.Outputs.BucketArn
        VectorIndexName: !Ref VectorIndexName
        EmbeddingModelArn: !Ref EmbeddingModelArn
        EnvName: !Ref EnvName
        ServiceName: !Ref ServiceName

  SQSDLQStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${EnvName}-${ServiceName}-aiops-artifact/${TempletePrefix}/cfn-templates/sqs-dlq.yaml'
      Parameters:
        EnvName: !Ref EnvName
        ServiceName: !Ref ServiceName

  # AgentCore Runtime stack (replaces BedrockAgentStack)
  AgentCoreRuntimeStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${EnvName}-${ServiceName}-aiops-artifact/${TempletePrefix}/cfn-templates/agentcore-runtime.yaml'
      Parameters:
        EnvName: !Ref EnvName
        ServiceName: !Ref ServiceName
        ImageTag: !Ref AgentCoreImageTag
        ImgRepoName: !Sub '${EnvName}-${ServiceName}-aiops-agentcore'
        BedrockKnowledgeBaseArn: !GetAtt KnowledgeBaseStack.Outputs.KnowledgeBaseArn
        KnowledgeBaseId: !GetAtt KnowledgeBaseStack.Outputs.KnowledgeBaseId
        SNSTopicArn: !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:${EnvName}-aiops-alarm-notification-topic'
        BedrockKbModelArn: !Ref BedrockKbModelArn

  LambdaStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${EnvName}-${ServiceName}-aiops-artifact/${TempletePrefix}/cfn-templates/lambda-function.yaml'
      Parameters:
        EnvName: !Ref EnvName
        ServiceName: !Ref ServiceName
        BucketName: !Sub '${EnvName}-${ServiceName}-aiops-artifact'
        SNSTopicArn: !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:${EnvName}-aiops-alarm-notification-topic'
        AgentCoreRuntimeArn: !GetAtt AgentCoreRuntimeStack.Outputs.AgentRuntimeArn
        DLQArn: !GetAtt SQSDLQStack.Outputs.DLQArn
        LambdaS3ObjectVersion: !Ref LambdaS3ObjectVersion

  SecretsManagerStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${EnvName}-${ServiceName}-aiops-artifact/${TempletePrefix}/cfn-templates/secrets-manager.yaml'
      Parameters:
        EnvName: !Ref EnvName

  SlackWebhookStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${EnvName}-${ServiceName}-aiops-artifact/${TempletePrefix}/cfn-templates/slack-webhook.yaml'
      Parameters:
        TemplateBucketName: !Sub '${EnvName}-${ServiceName}-aiops-artifact'
        EnvName: !Ref EnvName
        ServiceName: !Ref ServiceName
        S3DataBucket: !GetAtt S3Stack.Outputs.BucketName
        SlackCredentialsSecretArn: !GetAtt SecretsManagerStack.Outputs.SlackCredentialsSecretArn

  ChatbotSlackNotificationStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: SlackWebhookStack
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${EnvName}-${ServiceName}-aiops-artifact/${TempletePrefix}/cfn-templates/chatbot-slack-notification.yaml'
      Parameters:
        EnvName: !Ref EnvName
        ServiceName: !Ref ServiceName
        SlackWorkspaceId: !Ref SlackWorkspaceId
        SlackChannelId: !Ref SlackChannelId

  EventBridgeAlarmsStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${EnvName}-${ServiceName}-aiops-artifact/${TempletePrefix}/cfn-templates/eventbridge-alarms.yaml'
      Parameters:
        LambdaFunctionArn: !GetAtt LambdaStack.Outputs.LambdaARN
        EnvName: !Ref EnvName
        ServiceName: !Ref ServiceName

  # CloudWatch アラーム: AgentCore Runtime エージェントログのエラーを監視
  # エラーログ検出 → Lambda-ErrorRate- アラーム → EventBridge → AgentCore → LogInvestigation
  CloudWatchAlarmsStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${EnvName}-${ServiceName}-aiops-artifact/${TempletePrefix}/cfn-templates/cloudwatch-alarms.yaml'
      Parameters:
        EnvName: !Ref EnvName
        ServiceName: !Ref ServiceName
        AgentRuntimeId: !GetAtt AgentCoreRuntimeStack.Outputs.AgentRuntimeId
        SNSTopicArn: !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:${EnvName}-aiops-alarm-notification-topic'

Outputs: {}
