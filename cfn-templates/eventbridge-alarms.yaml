AWSTemplateFormatVersion: '2010-09-09'
Description: 'EventBridge Rules for CloudWatch Alarms to Lambda Integration (AIOps)'

Parameters:
  LambdaFunctionArn:
    Type: String
    Description: 'ARN of the Lambda function to invoke on alarm (e.g., arn:aws:lambda:ap-northeast-1:123456789012:function:aiops-lambda)'

  EnvName:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: EnvName name for resource naming
  
  ServiceName:
    Type: String
    Default: aiops
    Description: Service name for resource naming

Resources:
  # ========================================
  # EventBridge Rules
  # ========================================
  
  # Rule 1: EC2 High CPU Alarm Trigger
  EC2HighCPUAlarmRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${EnvName}-aiops-ec2-high-cpu-alarm'
      Description: 'Triggers Lambda when EC2 instance has high CPU usage'
      EventBusName: default
      EventPattern:
        source:
          - aws.cloudwatch
        detail-type:
          - CloudWatch Alarm State Change
        detail:
          alarmName:
            - prefix: EC2-HighCPU
          state:
            value:
              - ALARM
      State: ENABLED
      Targets:
        - Arn: !Ref LambdaFunctionArn
          Id: EC2HighCPUTarget
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn

  # Rule 2: RDS CPU Alarm Trigger
  RDSHighCPUAlarmRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${EnvName}-aiops-rds-high-cpu-alarm'
      Description: 'Triggers Lambda when RDS instance has high CPU usage'
      EventBusName: default
      EventPattern:
        source:
          - aws.cloudwatch
        detail-type:
          - CloudWatch Alarm State Change
        detail:
          alarmName:
            - prefix: RDS-HighCPU
          state:
            value:
              - ALARM
      State: ENABLED
      Targets:
        - Arn: !Ref LambdaFunctionArn
          Id: RDSHighCPUTarget
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn

  # Rule 3: RDS Connection Count Alarm Trigger
  RDSHighConnectionsAlarmRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${EnvName}-aiops-rds-high-connections-alarm'
      Description: 'Triggers Lambda when RDS connection count exceeds threshold'
      EventBusName: default
      EventPattern:
        source:
          - aws.cloudwatch
        detail-type:
          - CloudWatch Alarm State Change
        detail:
          alarmName:
            - prefix: RDS-HighConnections
          state:
            value:
              - ALARM
      State: ENABLED
      Targets:
        - Arn: !Ref LambdaFunctionArn
          Id: RDSHighConnectionsTarget
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn

  # Rule 4: RDS Replication Lag Alarm Trigger
  RDSReplicationLagAlarmRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${EnvName}-aiops-rds-replication-lag-alarm'
      Description: 'Triggers Lambda when RDS replication lag exceeds threshold'
      EventBusName: default
      EventPattern:
        source:
          - aws.cloudwatch
        detail-type:
          - CloudWatch Alarm State Change
        detail:
          alarmName:
            - prefix: RDS-ReplicationLag
          state:
            value:
              - ALARM
      State: ENABLED
      Targets:
        - Arn: !Ref LambdaFunctionArn
          Id: RDSReplicationLagTarget
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn

  # Rule 5: Lambda Error Rate Alarm Trigger
  LambdaErrorAlarmRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${EnvName}-aiops-lambda-error-alarm'
      Description: 'Triggers Lambda when Lambda error rate exceeds threshold'
      EventBusName: default
      EventPattern:
        source:
          - aws.cloudwatch
        detail-type:
          - CloudWatch Alarm State Change
        detail:
          alarmName:
            - prefix: Lambda-ErrorRate
          state:
            value:
              - ALARM
      State: ENABLED
      Targets:
        - Arn: !Ref LambdaFunctionArn
          Id: LambdaErrorTarget
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn

  # Rule 6: Lambda Throttle Alarm Trigger
  LambdaThrottleAlarmRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${EnvName}-aiops-lambda-throttle-alarm'
      Description: 'Triggers Lambda when Lambda throttles are detected'
      EventBusName: default
      EventPattern:
        source:
          - aws.cloudwatch
        detail-type:
          - CloudWatch Alarm State Change
        detail:
          alarmName:
            - prefix: Lambda-Throttle
          state:
            value:
              - ALARM
      State: ENABLED
      Targets:
        - Arn: !Ref LambdaFunctionArn
          Id: LambdaThrottleTarget
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn

  # Rule 7: Scheduled Maintenance (Weekly Cron)
  ScheduledMaintenanceRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${EnvName}-aiops-scheduled-maintenance'
      Description: 'Triggers Lambda for weekly maintenance at Sunday 00:00 UTC'
      ScheduleExpression: 'cron(0 0 ? * SUN *)'
      State: ENABLED
      Targets:
        - Arn: !Ref LambdaFunctionArn
          Id: ScheduledMaintenanceTarget
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn

  # Rule 8: Alarm State Recovery (INSUFFICIENT_DATA -> OK)
  AlarmRecoveryRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${EnvName}-aiops-alarm-recovery'
      Description: 'Logs when alarms recover to OK state'
      EventBusName: default
      EventPattern:
        source:
          - aws.cloudwatch
        detail-type:
          - CloudWatch Alarm State Change
        detail:
          state:
            value:
              - OK
      State: ENABLED
      Targets:
        - Arn: !GetAtt AlarmRecoveryLogGroup.Arn
          Id: AlarmRecoveryLogTarget
          RoleArn: !GetAtt EventBridgeLogRole.Arn

  # ========================================
  # CloudWatch Logs Group
  # ========================================

  AlarmRecoveryLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/events/${EnvName}/alarm-recovery'
      RetentionInDays: 30

  # ========================================
  # Lambda Permission for EventBridge
  # ========================================

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunctionArn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !Sub 'arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/${EnvName}-aiops-*'

  # ========================================
  # IAM Roles
  # ========================================

  EventBridgeInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvName}-${ServiceName}-eventbridge-invoke-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Ref LambdaFunctionArn

  EventBridgeLogRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvName}-${ServiceName}-eventbridge-log-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PutLogsEvents
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt AlarmRecoveryLogGroup.Arn

Outputs:
  EC2HighCPUAlarmRuleArn:
    Description: ARN of EC2 High CPU Alarm Rule
    Value: !GetAtt EC2HighCPUAlarmRule.Arn
    Export:
      Name: !Sub '${EnvName}-EC2HighCPUAlarmRuleArn'

  RDSHighCPUAlarmRuleArn:
    Description: ARN of RDS High CPU Alarm Rule
    Value: !GetAtt RDSHighCPUAlarmRule.Arn
    Export:
      Name: !Sub '${EnvName}-RDSHighCPUAlarmRuleArn'

  RDSHighConnectionsAlarmRuleArn:
    Description: ARN of RDS High Connections Alarm Rule
    Value: !GetAtt RDSHighConnectionsAlarmRule.Arn
    Export:
      Name: !Sub '${EnvName}-RDSHighConnectionsAlarmRuleArn'

  RDSReplicationLagAlarmRuleArn:
    Description: ARN of RDS Replication Lag Alarm Rule
    Value: !GetAtt RDSReplicationLagAlarmRule.Arn
    Export:
      Name: !Sub '${EnvName}-RDSReplicationLagAlarmRuleArn'

  LambdaErrorAlarmRuleArn:
    Description: ARN of Lambda Error Alarm Rule
    Value: !GetAtt LambdaErrorAlarmRule.Arn
    Export:
      Name: !Sub '${EnvName}-LambdaErrorAlarmRuleArn'

  LambdaThrottleAlarmRuleArn:
    Description: ARN of Lambda Throttle Alarm Rule
    Value: !GetAtt LambdaThrottleAlarmRule.Arn
    Export:
      Name: !Sub '${EnvName}-LambdaThrottleAlarmRuleArn'

  ScheduledMaintenanceRuleArn:
    Description: ARN of Scheduled Maintenance Rule
    Value: !GetAtt ScheduledMaintenanceRule.Arn
    Export:
      Name: !Sub '${EnvName}-ScheduledMaintenanceRuleArn'

  AlarmRecoveryRuleArn:
    Description: ARN of Alarm Recovery Rule
    Value: !GetAtt AlarmRecoveryRule.Arn
    Export:
      Name: !Sub '${EnvName}-AlarmRecoveryRuleArn'

  AlarmRecoveryLogGroupName:
    Description: CloudWatch Logs Group for alarm recovery events
    Value: !Ref AlarmRecoveryLogGroup
    Export:
      Name: !Sub '${EnvName}-AlarmRecoveryLogGroupName'

  EventBridgeInvokeRoleArn:
    Description: ARN of EventBridge Invoke Role
    Value: !GetAtt EventBridgeInvokeRole.Arn
    Export:
      Name: !Sub '${EnvName}-EventBridgeInvokeRoleArn'
