AWSTemplateFormatVersion: '2010-09-09'
Description: Lambda function for AIOps
Parameters:
  EnvName:
    Type: String
    Description: Environment name
    Default: dev
  ServiceName:
    Type: String
    Description: Service name
    Default: aiops
  BucketName:
    Type: String
    Description: S3 bucket where lambda.zip is stored
  SNSTopicArn:
    Type: String
    Description: SNS Topic ARN for alarm notifications
    Default: 'arn:aws:sns:ap-northeast-1:123456789012:dev-aiops-alarm-notification-topic'
  BedrockAgentId:
    Type: String
    Description: Bedrock Agent ID for Lambda to invoke
    Default: ''
  BedrockAgentAlias:
    Type: String
    Description: Bedrock Agent Alias for Lambda to invoke
    Default: 'TSTALIASID'
Resources:
  AiopsLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: AiopsLambda
      Runtime: python3.12
      Handler: lambda_function.handler
      Code:
        S3Bucket: !Ref BucketName
        S3Key: lambda.zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      Environment:
        Variables:
          SNS_REPORT_ARN: !Ref SNSTopicArn
          SNS_LOG_INVESTIGATION_ARN: !Ref SNSTopicArn
          SNS_BOTTLENECK_ARN: !Ref SNSTopicArn
          SNS_SNAPSHOT_ARN: !Ref SNSTopicArn
          SNS_MAINTENANCE_ARN: !Ref SNSTopicArn
          SNS_SLOW_QUERY_ARN: !Ref SNSTopicArn
          SNS_HIGH_LOAD_QUERY_ARN: !Ref SNSTopicArn
          BEDROCK_AGENT_ID: !Ref BedrockAgentId
          BEDROCK_AGENT_ALIAS: !Ref BedrockAgentAlias
      DeadLetterConfig:
        TargetArn: arn:aws:sqs:ap-northeast-1:123456789012:dlq
      TracingConfig:
        Mode: Active
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvName}-${ServiceName}-lambda-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
         - PolicyName: LambdaBedrockAgentPolicy
           PolicyDocument:
             Version: '2012-10-17'
             Statement:
               - Effect: Allow
                 Action:
                   - bedrock:InvokeAgent
                   - bedrock:InvokeModel
                   - bedrock:RetrieveAndGenerate
                 Resource: '*'
         - PolicyName: LambdaOpenSearchAccessPolicy
           PolicyDocument:
             Version: '2012-10-17'
             Statement:
               - Effect: Allow
                 Action:
                   - aoss:APIAccessAll
                 Resource:
                   - !Sub 'arn:aws:aoss:${AWS::Region}:${AWS::AccountId}:collection/aiops-kb-collection'
         - PolicyName: LambdaSNSPublishPolicy
           PolicyDocument:
             Version: '2012-10-17'
             Statement:
               - Effect: Allow
                 Action:
                   - sns:Publish
                 Resource:
                   - !Ref SNSTopicArn


  # Lambda Permission for Bedrock Agent to invoke this function
  # Reference: https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-lambda-permission.html
  BedrockAgentInvokeLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AiopsLambda
      Action: lambda:InvokeFunction
      Principal: bedrock.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

Outputs:
  LambdaARN:
    Value: !GetAtt AiopsLambda.Arn
