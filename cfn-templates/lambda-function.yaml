AWSTemplateFormatVersion: '2010-09-09'
Description: Lambda thin proxy for AIOps - EventBridge to AgentCore Runtime

Parameters:
  EnvName:
    Type: String
    Description: Environment name
    Default: dev
  ServiceName:
    Type: String
    Description: Service name
    Default: aiops
  BucketName:
    Type: String
    Description: S3 bucket where lambda.zip is stored
  SNSTopicArn:
    Type: String
    Description: SNS Topic ARN for error notifications
    Default: 'arn:aws:sns:ap-northeast-1:123456789012:dev-aiops-alarm-notification-topic'
  AgentCoreRuntimeArn:
    Type: String
    Description: AgentCore Runtime ARN to invoke (from AgentCoreRuntimeStack output)
    Default: ''
  DLQArn:
    Type: String
    Description: Dead Letter Queue ARN for Lambda function errors
    Default: ''
  LambdaS3ObjectVersion:
    Type: String
    Description: >
      S3 Object Version ID of lambda.zip.
      CodeBuild post_build で取得し cfn-*.json に注入される。
      これにより S3Key が変わらなくても Lambda が更新される。
    Default: ''

Conditions:
  DLQConfigured: !Not [!Equals [!Ref DLQArn, '']]
  AgentCoreConfigured: !Not [!Equals [!Ref AgentCoreRuntimeArn, '']]
  S3VersionConfigured: !Not [!Equals [!Ref LambdaS3ObjectVersion, '']]

Resources:
  AiopsLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${EnvName}-${ServiceName}-AiopsLambda'
      Runtime: python3.12
      Handler: lambda_function.handler
      Code:
        S3Bucket: !Ref BucketName
        S3Key: lambda.zip
        S3ObjectVersion: !If
          - S3VersionConfigured
          - !Ref LambdaS3ObjectVersion
          - !Ref AWS::NoValue
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      Environment:
        Variables:
          SNS_REPORT_ARN: !Ref SNSTopicArn
          AGENTCORE_RUNTIME_ARN: !If
            - AgentCoreConfigured
            - !Ref AgentCoreRuntimeArn
            - ''
      DeadLetterConfig: !If
        - DLQConfigured
        - TargetArn: !Ref DLQArn
        - !Ref AWS::NoValue
      TracingConfig:
        Mode: Active

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvName}-${ServiceName}-lambda-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        # AgentCore Runtime 呼び出し（指定 ARN のみ）
        - PolicyName: LambdaAgentCoreInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: InvokeAgentRuntime
                Effect: Allow
                Action:
                  - bedrock-agentcore:InvokeAgentRuntime
                Resource: !If
                  - AgentCoreConfigured
                  - !Ref AgentCoreRuntimeArn
                  - !Sub 'arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*'
        # SNS エラー通知（指定トピックのみ）
        - PolicyName: LambdaSNSPublishPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: SNSPublish
                Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Ref SNSTopicArn
        # SQS DLQ（指定キューのみ）
        - PolicyName: LambdaSQSSendMessagePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: SQSSendMessage
                Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource:
                  - !Sub 'arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:${EnvName}-${ServiceName}-lambda-dlq'

Outputs:
  LambdaARN:
    Value: !GetAtt AiopsLambda.Arn
    Export:
      Name: !Sub '${EnvName}-${ServiceName}-LambdaArn'
