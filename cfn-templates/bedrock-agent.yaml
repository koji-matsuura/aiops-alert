AWSTemplateFormatVersion: '2010-09-09'
Description: Bedrock Agent with IAM Role for AIOps
Parameters:
  EnvName:
    Type: String
    Description: Environment name
    Default: dev
  ServiceName:
    Type: String
    Description: Service name
    Default: aiops
  AgentName:
    Type: String
    Default: AiopsAgent
    Description: Bedrock Agent の名前
  Description:
    Type: String
    Default: AIOps investigation and remediation agent
    Description: Bedrock Agent の説明
  FoundationModel:
    Type: String
    Default: anthropic.claude-haiku-4-5-20251001-v1:0
    Description: Bedrock Agent が使用するモデル
  KnowledgeBaseId:
    Type: String
    Default: KBABCDEFGH
    Description: Knowledge Base ID
    AllowedPattern: '^[0-9a-zA-Z]{10}$'
  ActionGroupLambdaArn:
    Type: String
    Description: Lambda function ARN for Action Group (from lambda-function.yaml output)
    Default: 'arn:aws:lambda:ap-northeast-1:123456789012:function:AiopsLambda'
Resources:
  # Bedrock Agent用IAMロール
  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvName}-${ServiceName}-bedrock-agent-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess
      Policies:
        - PolicyName: BedrockAgentOpenSearchPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - aoss:APIAccessAll
                Resource: !Sub 'arn:aws:aoss:${AWS::Region}:${AWS::AccountId}:collection/*'
        - PolicyName: BedrockAgentLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*'
        - PolicyName: BedrockAgentBedrockPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeAgent
                Resource: '*'
        - PolicyName: BedrockAgentKnowledgeBasePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:Retrieve
                  - bedrock:RetrieveAndGenerate
                Resource: !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:knowledge-base/*'
      Tags:
        - Key: Environment
          Value: dev
        - Key: Service
          Value: aiops
  # Bedrock Agent
  BedrockAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: !Ref AgentName
      Description: !Ref Description
      FoundationModel: !Ref FoundationModel
      AgentResourceRoleArn: !GetAtt BedrockAgentRole.Arn
      Instruction: |-
        あなたは AWS インフラストラクチャの自動運用（AIOps）を支援するアシスタントです。

        ## 主な責務
        1. インフラの問題を迅速に診断する
        2. ボトルネックを特定し、根本原因を分析する
        3. ランブックに基づいた自動復旧アクションを実行する
        4. リアルタイムアラート（CloudWatch）に対応する

        ## 対象システム
        - EC2 インスタンス（CPU/メモリ/ディスク）
        - Amazon RDS（MySQL/PostgreSQL）
          - CPU 使用率・コネクション数・レプリケーションラグ
          - 遅いクエリ・高負荷クエリ
        - AWS Lambda（エラー率・スロットル）

        ## アクション実行の優先度（高→低）
        1. **FR-01: ログ調査** - CloudWatch Logs から最新エラーを検索。まずはこれで問題を特定。
        2. **FR-02: ボトルネック調査** - CloudWatch メトリクスから CPU/メモリ/接続を分析。
        3. **FR-05: 遅いクエリ検出** - RDS Performance Insights で DB クエリ性能を確認。
        4. **FR-06: 高負荷クエリ分析** - 複数クエリの影響度を測定。
        5. **FR-03: DB スナップショット作成** - 問題発生時のデータ保全。緊急時のみ。
        6. **FR-04: メンテナンスウィンドウ表示** - 予防的なシステムチェック。非緊急時。

        ## Knowledge Base（ランブック）の活用
        - ユーザーの質問に対して、まず Knowledge Base から関連ランブックを検索する。
        - セマンティック検索を活用し、問い合わせの意図に最も近いランブックを優先する。
        - ランブックに記載されたステップを用いて調査・復旧手順を説明する。

        ## 返答形式
        - 常に JSON 形式で返答する。
        - 調査結果・アクション内容・推奨事項を明確に分離する。
        - 可能な限り具体的な数値・メトリクス・根本原因を含める。

        ## 制約・注意点
        - 機密情報（DB パスワード・API キー）は返答に含めない。
        - 実行権限外のアクションは提案しない。
        - 調査完了後、常に SNS で関連チームに通知する。
        - タイムアウトは 60 秒。時間がかかる調査は非同期で実行し、Job ID を返す。
      AutoPrepare: true
      IdleSessionTTLInSeconds: 600
      KnowledgeBases:
        - KnowledgeBaseId: !Ref KnowledgeBaseId
          Description: AIOps runbooks (FR-01~FR-06)
      ActionGroups:
        - ActionGroupName: AIOpsActionGroup
          ActionGroupState: ENABLED
          Description: Action Group for AIOps Lambda functions (FR-01～06, 6 independent functions)
          ActionGroupExecutor:
            Lambda: !Ref ActionGroupLambdaArn
          FunctionSchema:
            Functions:
              # FR-01: ログ調査
              - Name: LogInvestigation
                Description: "FR-01: CloudWatch Logs を調査してエラーを特定"
                RequireConfirmation: DISABLED
                Parameters:
                  log_group_name:
                    Type: string
                    Description: "CloudWatch log group name (e.g., /aws/lambda/my-function)"
                    Required: true
                  log_stream_name:
                    Type: string
                    Description: "CloudWatch log stream name (e.g., 2026-06-17)"
                    Required: true
                  time_range_seconds:
                    Type: integer
                    Description: "Time range in seconds for log search (default: 3600)"
                    Required: false
              
              # FR-02: ボトルネック調査
              - Name: BottleneckAnalysis
                Description: "FR-02: CloudWatch メトリクスからリソースボトルネック（CPU/メモリ/接続）を調査"
                RequireConfirmation: DISABLED
                Parameters:
                  resource_id:
                    Type: string
                    Description: "Resource ID (e.g., i-1234567890abcdef0 for EC2, prod-db-instance for RDS)"
                    Required: true
                  resource_type:
                    Type: string
                    Description: "Resource type (e.g., EC2, RDS, Lambda)"
                    Required: true
                  time_range_seconds:
                    Type: integer
                    Description: "Time range in seconds for metric analysis (default: 3600)"
                    Required: false
              
              # FR-03: DB スナップショット作成
              - Name: CreateSnapshot
                Description: "FR-03: RDS データベースのスナップショットを作成（緊急時のデータ保全）"
                RequireConfirmation: DISABLED
                Parameters:
                  db_instance_id:
                    Type: string
                    Description: "RDS database instance identifier (e.g., prod-order-db)"
                    Required: true
                  snapshot_identifier:
                    Type: string
                    Description: "Name for the snapshot (e.g., emergency-backup-20260617-103000)"
                    Required: true
                  region:
                    Type: string
                    Description: "AWS region (e.g., ap-northeast-1)"
                    Required: false
              
              # FR-04: メンテナンスウィンドウ表示
              - Name: MaintenanceDisplay
                Description: "FR-04: RDS メンテナンスウィンドウを表示（予防的なシステムチェック）"
                RequireConfirmation: DISABLED
                Parameters:
                  db_instance_id:
                    Type: string
                    Description: "RDS database instance identifier (e.g., prod-order-db)"
                    Required: true
                  display_format:
                    Type: string
                    Description: "Display format (e.g., json, text)"
                    Required: false
                  region:
                    Type: string
                    Description: "AWS region (e.g., ap-northeast-1)"
                    Required: false
              
              # FR-05: スロークエリ検出
              - Name: SlowQueryDetection
                Description: "FR-05: RDS Performance Insights でスロークエリを検出（DB クエリ性能確認）"
                RequireConfirmation: DISABLED
                Parameters:
                  db_instance_id:
                    Type: string
                    Description: "RDS database instance identifier (e.g., prod-order-db)"
                    Required: true
                  analysis_period_days:
                    Type: integer
                    Description: "Analysis period in days (default: 7)"
                    Required: false
                  region:
                    Type: string
                    Description: "AWS region (e.g., ap-northeast-1)"
                    Required: false
              
              # FR-06: 高負荷クエリ分析
              - Name: HighLoadQueryAnalysis
                Description: "FR-06: 複数クエリの影響度を測定して高負荷クエリを分析"
                RequireConfirmation: DISABLED
                Parameters:
                  db_instance_id:
                    Type: string
                    Description: "RDS database instance identifier (e.g., prod-order-db)"
                    Required: true
                  analysis_period_days:
                    Type: integer
                    Description: "Analysis period in days (default: 7)"
                    Required: false
                  region:
                     Type: string
                     Description: "AWS region (e.g., ap-northeast-1)"
                     Required: false
      Tags:
        Environment: dev
        Service: aiops

  # Bedrock Agent Alias - required for Lambda invocation
  BedrockAgentAlias:
    Type: AWS::Bedrock::AgentAlias
    Properties:
      AgentId: !GetAtt BedrockAgent.AgentId
      AgentAliasName: !Sub '${EnvName}-alias'
      Description: !Sub 'Agent alias for ${EnvName} environment'

Outputs:
  AgentArn:
    Description: Bedrock AgentのARN
    Value: !GetAtt BedrockAgent.AgentArn
    Export:
      Name: !Sub 'aiops-${EnvName}-agent-Arn'
  AgentId:
    Description: Bedrock AgentのID
    Value: !GetAtt BedrockAgent.AgentId
    Export:
      Name: !Sub 'aiops-${EnvName}-agent-Id'
  AgentAliasId:
    Description: Bedrock Agent Alias ID
    Value: !GetAtt BedrockAgentAlias.AgentAliasId
    Export:
      Name: !Sub 'aiops-${EnvName}-agent-alias-id'
  RoleArn:
    Description: Bedrock Agent IAM RoleのARN
    Value: !GetAtt BedrockAgentRole.Arn
    Export:
      Name: !Sub 'aiops-${EnvName}-agent-role-arn'
