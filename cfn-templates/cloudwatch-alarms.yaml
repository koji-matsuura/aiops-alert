AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudWatch Logs メトリクスフィルターと アラーム for AIOps エージェントログ監視.
  AgentCore Runtime のエラーログを監視し、Lambda-ErrorRate- アラームとして
  eventbridge-alarms.yaml の LambdaErrorAlarmRule に通知する。

Parameters:
  EnvName:
    Type: String
    Description: Environment name
    Default: dev
  ServiceName:
    Type: String
    Description: Service name
    Default: aiops
  AgentRuntimeId:
    Type: String
    Description: >
      AgentCore Runtime ID (from AgentCoreRuntimeStack output).
      Used to construct the CloudWatch Logs log group name.
  SNSTopicArn:
    Type: String
    Description: SNS Topic ARN for alarm notifications

Resources:
  # ============================================================================
  # AgentCore Runtime エラーログ メトリクスフィルター
  # ロググループ: /aws/bedrock-agentcore/runtimes/{RuntimeId}-DEFAULT
  # フィルタ対象: ERROR レベルのログ
  # ============================================================================
  AgentCoreErrorMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Sub '/aws/bedrock-agentcore/runtimes/${AgentRuntimeId}-DEFAULT'
      FilterName: !Sub '${EnvName}-${ServiceName}-agentcore-error-filter'
      FilterPattern: '"ERROR"'
      MetricTransformations:
        - MetricNamespace: !Sub '${EnvName}/${ServiceName}/AgentCore'
          MetricName: AgentCoreErrors
          MetricValue: '1'
          DefaultValue: 0
          Unit: Count

  # ============================================================================
  # AgentCore エラーアラーム
  # アラーム名 Lambda-ErrorRate- プレフィックス:
  #   eventbridge-alarms.yaml LambdaErrorAlarmRule (行122) が検知するための命名規則
  #   alarmName.prefix: Lambda-ErrorRate
  # ============================================================================
  AgentCoreErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: AgentCoreErrorMetricFilter
    Properties:
      AlarmName: !Sub 'Lambda-ErrorRate-${EnvName}-${ServiceName}-agentcore'
      AlarmDescription: !Sub >
        AgentCore Runtime (${AgentRuntimeId}) のエラーログ監視。
        ERROR ログ検出時 EventBridge → AgentCore → LogInvestigation (FR-01) を実行。
        誤検知防止: エラーログが出た場合のみ LogInvestigation ルールが選択される。
      Namespace: !Sub '${EnvName}/${ServiceName}/AgentCore'
      MetricName: AgentCoreErrors
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref SNSTopicArn
      OKActions:
        - !Ref SNSTopicArn

Outputs:
  AgentCoreErrorAlarmName:
    Description: AgentCore エラーアラーム名（Lambda-ErrorRate- プレフィックス）
    Value: !Ref AgentCoreErrorAlarm
    Export:
      Name: !Sub '${EnvName}-${ServiceName}-AgentCoreErrorAlarmName'
