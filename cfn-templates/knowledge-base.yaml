AWSTemplateFormatVersion: '2010-09-09'
Description: Bedrock Knowledge Base with integrated OpenSearch Serverless
Parameters:
  KnowledgeBaseName:
    Type: String
    Default: AiopsKnowledgeBase
    Description: Knowledge BaseのID（一意）
  VectorIndexName:
    Type: String
    Default: aiops-kb-index
    Description: OpenSearch内のベクトルインデックス名
  EmbeddingModelArn:
    Type: String
    Default: arn:aws:bedrock:ap-northeast-1::foundation-model/amazon.titan-embed-text-v2:0
    Description: Bedrock TitanエンベーディングモデルのARN
  S3DataBucketArn:
    Type: String
    Description: ナレッジベースのデータソースとなるS3バケットのARN
Resources:
  # ===== Encryption Security Policy =====
  # REQUIRED: Must be created BEFORE collection
  # AWS Docs: https://docs.aws.amazon.com/opensearch-service/latest/developerguide/serverless-encryption.html
  EncryptionSecurityPolicy:
    Type: AWS::OpenSearchServerless::SecurityPolicy
    Properties:
      Name: aiops-encryption-policy
      Type: encryption
      Description: Encryption policy for AIOps KB collection
      Policy: '{"Rules":[{"ResourceType":"collection","Resource":["collection/aiops-kb-collection"]}],"AWSOwnedKey":true}'

  # ===== Network Security Policy =====
  # REQUIRED: Must be created BEFORE collection to restrict access
  # AWS Docs: https://docs.aws.amazon.com/opensearch-service/latest/developerguide/serverless-network.html
  # CRITICAL: Specifies AllowFromPublic=false to enforce IAM-only access
  # Policy must be a valid JSON array with Rules and AllowFromPublic at root level
  NetworkSecurityPolicy:
    Type: AWS::OpenSearchServerless::SecurityPolicy
    Properties:
      Name: aiops-network-policy
      Type: network
      Description: Network policy for AIOps KB collection - IAM-only access
      Policy: '[{"Rules":[{"ResourceType":"collection","Resource":["collection/aiops-kb-collection"]},{"ResourceType":"dashboard","Resource":["collection/aiops-kb-collection"]}],"AllowFromPublic":false}]'

  # ===== OpenSearch Serverless Collection =====
  OpensearchCollection:
    Type: AWS::OpenSearchServerless::Collection
    DependsOn:
      - EncryptionSecurityPolicy
      - NetworkSecurityPolicy
    Properties:
      Name: aiops-kb-collection
      Description: OpenSearch collection for AIOps KB
      Type: SEARCH

  # Knowledge Base用IAMロール
  KnowledgeBaseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KnowledgeBaseOpenSearchPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - aoss:APIAccessAll
                  - aoss:DashboardsAccessAll
                Resource: !GetAtt OpensearchCollection.Arn
                # AWS Docs: https://docs.aws.amazon.com/opensearch-service/latest/developerguide/serverless-data-access.html
                # CRITICAL: Both aoss:APIAccessAll AND aoss:DashboardsAccessAll are required.
                # If missing, principal receives 403 Forbidden when accessing OpenSearch collection.
        - PolicyName: KnowledgeBaseS3Policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Ref S3DataBucketArn
                  - !Sub '${S3DataBucketArn}/*'
        - PolicyName: KnowledgeBaseBedRockPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:ListFoundationModels
                  - bedrock:GetFoundationModel
                Resource: '*'
      Tags:
        - Key: Environment
          Value: dev
        - Key: Service
          Value: aiops

  # ===== Data Access Policy for Knowledge Base =====
  # REQUIRED: Must grant aoss:DescribeIndex, aoss:ReadDocument, aoss:WriteDocument
  # AWS Docs: https://docs.aws.amazon.com/bedrock/latest/userguide/kb-create-security.html
  # CRITICAL: Principal must be a full ARN. OpenSearch validates Principal at policy creation time.
  DataAccessPolicy:
    Type: AWS::OpenSearchServerless::AccessPolicy
    DependsOn: OpensearchCollection
    Properties:
      Name: aiops-kb-data-access-policy
      Type: data
      Description: Data access policy for Bedrock Knowledge Base
      Policy: !Sub
        - |
          [
            {
              "Description": "Allow Bedrock Knowledge Base access to collection",
              "Rules": [
                {
                  "Resource": [
                    "index/aiops-kb-collection/*"
                  ],
                  "Permission": [
                    "aoss:DescribeIndex",
                    "aoss:ReadDocument",
                    "aoss:WriteDocument"
                  ],
                  "ResourceType": "index"
                }
              ],
              "Principal": [
                "${KbRoleArn}"
              ]
            }
           ]
        - KbRoleArn: !GetAtt KnowledgeBaseRole.Arn

  # Bedrock Knowledge Base
  BedrockKnowledgeBase:
    Type: AWS::Bedrock::KnowledgeBase
    # DataAccessPolicy（Principal に KB Role を記載）が作成された後に
    # BedrockKnowledgeBase を作成する。これにより作成時の 403 Forbidden を回避。
    # 根拠: AWS re:Post "Missing permissions for an Amazon OpenSearch Serverless collection"
    # 注意: DependsOn のタイミング制御（CloudFormation リソース作成順序の保証）
    DependsOn: DataAccessPolicy
    Properties:
      Name: !Ref KnowledgeBaseName
      Description: AIOps用ナレッジベース（ランブック、トラブルシューティングガイド）
      RoleArn: !GetAtt KnowledgeBaseRole.Arn
      KnowledgeBaseConfiguration:
        Type: VECTOR
        VectorKnowledgeBaseConfiguration:
          EmbeddingModelArn: !Ref EmbeddingModelArn
      StorageConfiguration:
        Type: OPENSEARCH_SERVERLESS
        OpensearchServerlessConfiguration:
          CollectionArn: !GetAtt OpensearchCollection.Arn
          VectorIndexName: !Ref VectorIndexName
          FieldMapping:
            VectorField: vector_field
            TextField: text_field
            MetadataField: metadata_field
      Tags:
        Environment: dev
        Service: aiops
Outputs:
  KnowledgeBaseId:
    Description: Bedrock Knowledge BaseのID
    Value: !GetAtt BedrockKnowledgeBase.KnowledgeBaseId
    Export:
      Name: !Sub 'BedrockKB-Id-${AWS::StackName}'
  KnowledgeBaseArn:
    Description: Bedrock Knowledge BaseのARN
    Value: !GetAtt BedrockKnowledgeBase.KnowledgeBaseArn
    Export:
      Name: !Sub 'BedrockKB-Arn-${AWS::StackName}'
  KnowledgeBaseStatus:
    Description: Bedrock Knowledge Baseのステータス
    Value: !GetAtt BedrockKnowledgeBase.Status
    Export:
      Name: !Sub 'BedrockKB-Status-${AWS::StackName}'
  CollectionArn:
    Description: ARN of OpenSearch Serverless collection
    Value: !GetAtt OpensearchCollection.Arn
    Export:
      Name: !Sub 'BedrockKB-CollectionArn-${AWS::StackName}'
