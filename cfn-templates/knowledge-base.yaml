AWSTemplateFormatVersion: '2010-09-09'
Description: Bedrock Knowledge Base with integrated OpenSearch Serverless
Parameters:
  KnowledgeBaseName:
    Type: String
    Default: AiopsKnowledgeBase
    Description: Knowledge BaseのID（一意）
  VectorIndexName:
    Type: String
    Default: aiops-kb-index
    Description: OpenSearch内のベクトルインデックス名
  EmbeddingModelArn:
    Type: String
    Default: arn:aws:bedrock:ap-northeast-1::foundation-model/amazon.titan-embed-text-v2:0
    Description: Bedrock TitanエンベーディングモデルのARN
  S3DataBucketArn:
    Type: String
    Description: ナレッジベースのデータソースとなるS3バケットのARN
  EnvName:
    Type: String
    Default: dev
    Description: Environment name (dev, stg, prd)
  ServiceName:
    Type: String
    Default: aiops
    Description: Service name for resource naming
  CollectionName:
    Type: String
    Default: aiops-vs-collection
    Description: OpenSearch Serverless collection name (VECTORSEARCH type for kNN support)
Resources:
  # ===== Encryption Security Policy =====
  # REQUIRED: Must be created BEFORE collection
  # AWS Docs: https://docs.aws.amazon.com/opensearch-service/latest/developerguide/serverless-encryption.html
  EncryptionSecurityPolicy:
    Type: AWS::OpenSearchServerless::SecurityPolicy
    Properties:
      Name: aiops-encryption-policy
      Type: encryption
      Description: Encryption policy for AIOps KB collection
      Policy: !Sub '{"Rules":[{"ResourceType":"collection","Resource":["collection/${CollectionName}"]}],"AWSOwnedKey":true}'

  # ===== Network Security Policy =====
  # REQUIRED: Must be created BEFORE collection
  # AWS Docs: https://docs.aws.amazon.com/opensearch-service/latest/developerguide/serverless-network.html
  # CRITICAL: AllowFromPublic must be true (OpenSearch Serverless limitation)
  # Access control is enforced at IAM layer via Data Access Policy, not network layer
  NetworkSecurityPolicy:
    Type: AWS::OpenSearchServerless::SecurityPolicy
    Properties:
      Name: aiops-network-policy
      Type: network
      Description: Network policy for AIOps KB collection - allows network access
      Policy: !Sub '[{"Rules":[{"ResourceType":"collection","Resource":["collection/${CollectionName}"]},{"ResourceType":"dashboard","Resource":["collection/${CollectionName}"]}],"AllowFromPublic":true}]'

  # ===== OpenSearch Serverless Collection =====
  # REQUIRED: Type must be VECTORSEARCH for Bedrock Knowledge Base kNN vector queries
  # SEARCH type does NOT support k-NN. Error: "Unsupported query type"
  # AWS Docs: https://docs.aws.amazon.com/opensearch-service/latest/developerguide/serverless-overview.md
  OpensearchCollection:
    Type: AWS::OpenSearchServerless::Collection
    DependsOn:
      - EncryptionSecurityPolicy
      - NetworkSecurityPolicy
    Properties:
      Name: !Ref CollectionName
      Description: OpenSearch collection for AIOps KB (VECTORSEARCH for kNN support)
      Type: VECTORSEARCH

  # ===== OpenSearch Serverless Index =====
  # REQUIRED: Must be created BEFORE BedrockKnowledgeBase
  # AWS Docs: https://docs.aws.amazon.com/AWSCloudFormation/latest/TemplateReference/aws-resource-opensearchserverless-index.html
  # CRITICAL: Bedrock requires the index to exist with proper field mappings
  # CRITICAL: Must depend on DataAccessPolicy to ensure policy is active before CreateIndex API call
  # CRITICAL: Settings.Index.Knn must be true for k-NN vector search
  # CRITICAL: Mappings must define knn_vector field with 1024 dimensions (Titan Embed v2 default)
  OpensearchIndex:
    Type: AWS::OpenSearchServerless::Index
    DependsOn: DataAccessPolicy
    Properties:
      CollectionEndpoint: !GetAtt OpensearchCollection.CollectionEndpoint
      IndexName: !Ref VectorIndexName
      Settings:
        Index:
          Knn: true
      Mappings:
        Properties:
          vector_field:
            Type: knn_vector
            Dimension: 1024
            Method:
              Engine: faiss
              Name: hnsw
              SpaceType: l2
          text_field:
            Type: text
          metadata_field:
            Type: text

  # Knowledge Base用IAMロール
  KnowledgeBaseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvName}-${ServiceName}-knowledge-base-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KnowledgeBaseOpenSearchPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - aoss:APIAccessAll
                  - aoss:DashboardsAccessAll
                Resource: !GetAtt OpensearchCollection.Arn
                # AWS Docs: https://docs.aws.amazon.com/opensearch-service/latest/developerguide/serverless-data-access.html
                # CRITICAL: Both aoss:APIAccessAll AND aoss:DashboardsAccessAll are required.
                # If missing, principal receives 403 Forbidden when accessing OpenSearch collection.
        - PolicyName: KnowledgeBaseS3Policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Ref S3DataBucketArn
                  - !Sub '${S3DataBucketArn}/*'
        - PolicyName: KnowledgeBaseBedRockPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:ListFoundationModels
                  - bedrock:GetFoundationModel
                Resource: '*'
              # AWS Docs: https://docs.aws.amazon.com/bedrock/latest/userguide/kb-permissions.md
              # CRITICAL: bedrock:InvokeModel is required for Knowledge Base to call embedding model
              # during data ingestion (vectorization of documents).
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0'
      Tags:
        - Key: Environment
          Value: dev
        - Key: Service
          Value: aiops

  # ===== Data Access Policy for Knowledge Base =====
  # REQUIRED: Must grant aoss:DescribeIndex, aoss:ReadDocument, aoss:WriteDocument
  # AWS Docs: https://docs.aws.amazon.com/bedrock/latest/userguide/kb-create-security.html
  # CRITICAL: Principal must be a full ARN. OpenSearch validates Principal at policy creation time.
  # CRITICAL: Two Principals required:
  #   1. KnowledgeBaseRole (Bedrock service assumes this role)
  #   2. CpCrUpdRoleAiAgent (CloudFormation service role executing CreateIndex API)
  # CRITICAL: Index permissions must include aoss:CreateIndex, aoss:DeleteIndex, aoss:UpdateIndex
  #   for CloudFormation's CreateIndex operation to succeed during OpensearchIndex resource creation.
  DataAccessPolicy:
    Type: AWS::OpenSearchServerless::AccessPolicy
    DependsOn: OpensearchCollection
    Properties:
       Name: aiops-kb-data-access-policy
       Type: data
       Description: Data access policy for Bedrock Knowledge Base and CloudFormation
       Policy: !Sub
         - |
           [
             {
               "Description": "Allow Bedrock Knowledge Base and CloudFormation to access collection and index",
               "Rules": [
                 {
                   "Resource": [
                     "index/${CollectionName}/*"
                   ],
                   "Permission": [
                     "aoss:CreateIndex",
                     "aoss:DeleteIndex",
                     "aoss:UpdateIndex",
                     "aoss:DescribeIndex",
                     "aoss:ReadDocument",
                     "aoss:WriteDocument"
                   ],
                   "ResourceType": "index"
                 },
                 {
                   "Resource": [
                     "collection/${CollectionName}"
                   ],
                   "Permission": [
                     "aoss:CreateCollectionItems",
                     "aoss:DescribeCollectionItems"
                   ],
                   "ResourceType": "collection"
                 }
               ],
               "Principal": [
                 "${KbRoleArn}",
                 "${PipelineRoleArn}"
               ]
             }
           ]
         - KbRoleArn: !GetAtt KnowledgeBaseRole.Arn
           PipelineRoleArn: !Sub 'arn:aws:iam::${AWS::AccountId}:role/${EnvName}-${ServiceName}-cloudformation-update-role'
           CollectionName: !Ref CollectionName

  # Bedrock Knowledge Base
  BedrockKnowledgeBase:
    Type: AWS::Bedrock::KnowledgeBase
    # CRITICAL: Must depend on OpensearchIndex to ensure index exists before KB creation
    # Also requires DataAccessPolicy for IAM-based access control
    # DependsOn: Ensures creation order: OpensearchIndex → DataAccessPolicy → BedrockKnowledgeBase
    DependsOn:
      - OpensearchIndex
      - DataAccessPolicy
    Properties:
      Name: !Ref KnowledgeBaseName
      Description: AIOps用ナレッジベース（ランブック、トラブルシューティングガイド）
      RoleArn: !GetAtt KnowledgeBaseRole.Arn
      KnowledgeBaseConfiguration:
        Type: VECTOR
        VectorKnowledgeBaseConfiguration:
          EmbeddingModelArn: !Ref EmbeddingModelArn
      StorageConfiguration:
        Type: OPENSEARCH_SERVERLESS
        OpensearchServerlessConfiguration:
          CollectionArn: !GetAtt OpensearchCollection.Arn
          VectorIndexName: !Ref VectorIndexName
          FieldMapping:
            VectorField: vector_field
            TextField: text_field
            MetadataField: metadata_field
      Tags:
        Environment: dev
        Service: aiops

  # ===== Bedrock Data Source for S3 =====
  # REQUIRED: Connects Knowledge Base to S3 data source (runbooks only)
  # AWS Docs: https://docs.aws.amazon.com/bedrock/latest/APIReference/API_agent_CreateDataSource.html
  # CRITICAL CONSTRAINTS (AWS::Bedrock::DataSource):
  #   - InclusionPrefixes: Maximum 1 item (CloudFormation limit E3032)
  #   - InclusionPrefixes: ["."] would include ALL S3 files (not desirable)
  #   - InclusionPrefixes: ["runbooks/"] restricts to runbooks only
  #   - Tags: Not supported (CloudFormation property E3002)
  #   - DependsOn: Not required (already enforced by GetAtt)
  #
  # IMPACT ANALYSIS:
  #   - Restricting to "runbooks/" prevents accidental ingest of non-KB files
  #   - Phase 1: runbooks/ (FR-01～FR-06 ランブック)
  #   - Phase 2: documentation/ は将来対応予定
  #   - Only runbooks/ is ingested by default (FR-01 through FR-06 runbooks)
  BedrockDataSource:
    Type: AWS::Bedrock::DataSource
    Properties:
      KnowledgeBaseId: !GetAtt BedrockKnowledgeBase.KnowledgeBaseId
      Name: aiops-s3-data-source
      Description: S3 data source for AIOps runbooks (FR-01 through FR-06). Restricted to runbooks/ folder to prevent unintended file ingestion.
      DataSourceConfiguration:
        Type: S3
        S3Configuration:
          BucketArn: !Ref S3DataBucketArn
          InclusionPrefixes:
            - runbooks/
      DataDeletionPolicy: DELETE

Outputs:
  KnowledgeBaseId:
    Description: Bedrock Knowledge BaseのID
    Value: !GetAtt BedrockKnowledgeBase.KnowledgeBaseId
    Export:
      Name: !Sub 'aiops-${EnvName}-kb-Id'
  DataSourceId:
    Description: Bedrock Data Source IDのID
    Value: !GetAtt BedrockDataSource.DataSourceId
    Export:
      Name: !Sub 'aiops-${EnvName}-ds-Id'
  KnowledgeBaseArn:
    Description: Bedrock Knowledge BaseのARN
    Value: !GetAtt BedrockKnowledgeBase.KnowledgeBaseArn
    Export:
      Name: !Sub 'aiops-${EnvName}-kb-Arn'
  KnowledgeBaseStatus:
    Description: Bedrock Knowledge Baseのステータス
    Value: !GetAtt BedrockKnowledgeBase.Status
    Export:
      Name: !Sub 'aiops-${EnvName}-kb-Status'
  CollectionArn:
    Description: ARN of OpenSearch Serverless collection
    Value: !GetAtt OpensearchCollection.Arn
    Export:
      Name: !Sub 'aiops-${EnvName}-kb-CollectionArn'
